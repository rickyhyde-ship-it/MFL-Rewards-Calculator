<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MFL Rewards Calculator</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>MFL Rewards Calculator</h1>
      <div id="input-area">
        <input type="text" id="wallet-input" placeholder="Enter wallet address (0x...)" />
        <button id="calculate-btn">Calculate</button>
      </div>
    </header>
    <div id="status"></div>
    <div id="results" hidden>
      <div id="summary-bar"></div>
      <div id="club-cards"></div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
